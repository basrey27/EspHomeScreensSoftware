esphome:
  name: "screencontroller"
  friendly_name: ScreenTestAchteraan
  min_version: 2025.5.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- Pin toewijzing (ESP32, generieke NodeMCU-stijl devboard) ---
# GPIO25  -> motor snelheid (PWM, ledc)
# GPIO26  -> motor richting IN1
# GPIO27  -> motor richting IN2
# GPIO32  -> encoder kanaal A, los geteld (geen quadrature-decodering)
# GPIO13  -> encoder kanaal B, los geteld (geen quadrature-decodering)
# GPIO33  -> knop omhoog
# GPIO14  -> knop omlaag
#
# GPIO32 (kanaal A), GPIO33 (omhoog) en GPIO14 (omlaag) komen overeen met
# EspHomeScreenController.yaml, zodat de bekabeling van die pinnen hergebruikt
# kan worden. GPIO13 is enkel voor deze diagnostic-firmware (kanaal B wordt
# niet bedraad in de hoofdcontroller).

globals:
  - id: m1_running
    type: bool
    restore_value: no
    initial_value: 'false'

output:
  - platform: ledc
    pin: GPIO25
    id: m1_speed_pin
    frequency: 1000 Hz

switch:
  - platform: gpio
    pin: GPIO26
    id: m1_in1
    internal: true
  - platform: gpio
    pin: GPIO27
    id: m1_in2
    internal: true

# ------------------------------------------------------------
# Elk encoderkanaal apart geteld, zonder enige quadrature-logica.
# Doel: ruwe pulsen/seconde per kanaal vergelijken.
# ------------------------------------------------------------
sensor:
  - platform: pulse_counter
    pin: {number: GPIO32, mode: INPUT_PULLUP}
    id: b1_enc_a
    name: "Blind 1 Encoder A Pulses/min"
    update_interval: 1s
    on_raw_value:
      then:
        - logger.log:
            format: "ENC-A raw pulses this second: %.0f"
            args: [ 'x' ]

  - platform: pulse_counter
    pin: {number: GPIO13, mode: INPUT_PULLUP}
    id: b1_enc_b
    name: "Blind 1 Encoder B Pulses/min"
    update_interval: 1s
    on_raw_value:
      then:
        - logger.log:
            format: "ENC-B raw pulses this second: %.0f"
            args: [ 'x' ]

binary_sensor:
  - platform: gpio
    pin: {number: GPIO33, mode: INPUT_PULLUP, inverted: true}
    name: "Blind 1 Button Up"
    on_press: [cover.open: blind_1]
    on_release: [cover.stop: blind_1]
  - platform: gpio
    pin: {number: GPIO14, mode: INPUT_PULLUP, inverted: true}
    name: "Blind 1 Button Down"
    on_press: [cover.close: blind_1]
    on_release: [cover.stop: blind_1]

script:
  - id: ramp_up_m1
    mode: restart
    then:
      - repeat:
          count: 50
          then:
            - output.set_level:
                id: m1_speed_pin
                level: !lambda "return iteration / 50.0;"
            - delay: 100ms
      - lambda: 'id(m1_running) = true;'

cover:
  - platform: template
    name: "Blind 1"
    id: blind_1
    device_class: blind
    assumed_state: true
    open_action:
      - if:
          condition:
            lambda: 'return id(m1_running);'
          then:
            - output.set_level: {id: m1_speed_pin, level: 0.0}
            - switch.turn_off: m1_in1
            - switch.turn_off: m1_in2
            - delay: 150ms
            - lambda: 'id(m1_running) = false;'
      - switch.turn_on: m1_in1
      - switch.turn_off: m1_in2
      - script.execute: ramp_up_m1
    close_action:
      - if:
          condition:
            lambda: 'return id(m1_running);'
          then:
            - output.set_level: {id: m1_speed_pin, level: 0.0}
            - switch.turn_off: m1_in1
            - switch.turn_off: m1_in2
            - delay: 150ms
            - lambda: 'id(m1_running) = false;'
      - switch.turn_off: m1_in1
      - switch.turn_on: m1_in2
      - script.execute: ramp_up_m1
    stop_action:
      - script.stop: ramp_up_m1
      - if:
          condition:
            lambda: 'return id(m1_running);'
          then:
            - repeat:
                count: 20
                then:
                  - output.set_level:
                      id: m1_speed_pin
                      level: !lambda "return 1.0f - (iteration / 20.0f);"
                  - delay: 50ms
      - output.set_level: {id: m1_speed_pin, level: 0.0}
      - switch.turn_off: m1_in1
      - switch.turn_off: m1_in2
      - lambda: 'id(m1_running) = false;'
