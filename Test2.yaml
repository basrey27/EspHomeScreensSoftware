esphome:
  name: "screencontroller"
  friendly_name: BlindsControllerTest
  min_version: 2025.11.0
  name_add_mac_suffix: false

  on_boot:
    priority: -100
    then:
      - sensor.rotary_encoder.set_value:
          id: b1_encoder_position
          value: !lambda "return id(b1_current_pos);"

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  version: 3

preferences:
  flash_write_interval: 10s

# ------------------------------------------------------------
# Persistente en tijdelijke waarden
# ------------------------------------------------------------

globals:
  - id: b1_top_pulses
    type: int
    restore_value: yes
    initial_value: '0'

  - id: b1_bottom_pulses
    type: int
    restore_value: yes
    initial_value: '2000'

  - id: b1_current_pos
    type: int
    restore_value: yes
    initial_value: '0'

  - id: b1_target_pos
    type: int
    restore_value: no
    initial_value: '0'

  # 1 = omhoog/openen, -1 = omlaag/sluiten, 0 = stil
  - id: b1_motor_direction
    type: int
    restore_value: no
    initial_value: '0'

  - id: b1_auto_move
    type: bool
    restore_value: no
    initial_value: 'false'

  # Override levels:
  # 0 = geen override
  # 1 = limieten override
  # 2 = limieten + soft-start/soft-stop override
  # 4 = limieten + soft-start/soft-stop + jamdetectie override
  - id: b1_override_level
    type: int
    restore_value: yes
    initial_value: '0'

  - id: b1_tolerance
    type: int
    restore_value: no
    initial_value: '8'

  - id: b1_jam_start_pos
    type: int
    restore_value: no
    initial_value: '0'

  - id: b1_jam_min_delta
    type: int
    restore_value: no
    initial_value: '5'

  - id: b1_pwm_level
    type: float
    restore_value: no
    initial_value: '0.0'

# ------------------------------------------------------------
# Motor output
# ------------------------------------------------------------

output:
  - platform: ledc
    pin: GPIO25
    id: m1_speed_pin
    frequency: 1000 Hz

switch:
  - platform: gpio
    pin: GPIO13
    id: m1_in1
    internal: true

  - platform: gpio
    pin: GPIO27
    id: m1_in2
    internal: true

# ------------------------------------------------------------
# Encoder en zichtbare waarden
# ------------------------------------------------------------

sensor:
  - platform: rotary_encoder
    name: "Blind 1 Encoder Position"
    id: b1_encoder_position
    pin_a:
      number: GPIO34
      mode:
        input: true
    pin_b:
      number: GPIO35
      mode:
        input: true
    resolution: 1
    restore_mode: RESTORE_DEFAULT_ZERO
    on_value:
      then:
        - lambda: |-
            id(b1_current_pos) = (int) x;

  - platform: template
    name: "Blind 1 Current Value"
    id: b1_current_value_sensor
    lambda: |-
      return id(b1_current_pos);
    update_interval: 1s

  - platform: template
    name: "Blind 1 Top Value"
    id: b1_top_value_sensor
    lambda: |-
      return id(b1_top_pulses);
    update_interval: 1s

  - platform: template
    name: "Blind 1 Bottom Value"
    id: b1_bottom_value_sensor
    lambda: |-
      return id(b1_bottom_pulses);
    update_interval: 1s

  - platform: template
    name: "Blind 1 Target Value"
    id: b1_target_value_sensor
    lambda: |-
      return id(b1_target_pos);
    update_interval: 1s

# ------------------------------------------------------------
# Foutstatus en fysieke knoppen
# ------------------------------------------------------------

binary_sensor:
  - platform: template
    name: "Blind 1 Jam Error"
    id: b1_jam_error
    device_class: problem

  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP
      inverted: true
    name: "Blind 1 Button Up"
    on_press:
      - script.execute: motor_1_up_manual
    on_release:
      - script.execute: motor_1_stop_soft

  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    name: "Blind 1 Button Down"
    on_press:
      - script.execute: motor_1_down_manual
    on_release:
      - script.execute: motor_1_stop_soft

# ------------------------------------------------------------
# Override slider
# ------------------------------------------------------------

number:
  - platform: template
    name: "Blind 1 Override Level"
    id: b1_override_slider
    min_value: 0
    max_value: 4
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - lambda: |-
          int level = (int) x;

          // Enkel 0, 1, 2 en 4 zijn logisch geldig.
          // 3 wordt functioneel behandeld als 2.
          if (level == 3) level = 2;

          id(b1_override_level) = level;

# ------------------------------------------------------------
# Softwareknoppen
# ------------------------------------------------------------

button:
  - platform: template
    name: "Blind 1 Software Up"
    on_press:
      - script.execute: motor_1_up_manual

  - platform: template
    name: "Blind 1 Software Down"
    on_press:
      - script.execute: motor_1_down_manual

  - platform: template
    name: "Blind 1 Software Stop"
    on_press:
      - script.execute: motor_1_stop_soft

  - platform: template
    name: "Blind 1 Fully Open"
    on_press:
      - script.execute: motor_1_fully_open

  - platform: template
    name: "Blind 1 Fully Close"
    on_press:
      - script.execute: motor_1_fully_close

  - platform: template
    name: "Set Blind 1 Top"
    on_press:
      - lambda: |-
          id(b1_top_pulses) = id(b1_current_pos);
      - component.update: b1_top_value_sensor

  - platform: template
    name: "Set Blind 1 Bottom"
    on_press:
      - lambda: |-
          id(b1_bottom_pulses) = id(b1_current_pos);
      - component.update: b1_bottom_value_sensor

  - platform: template
    name: "Clear Blind 1 Jam Error"
    on_press:
      - binary_sensor.template.publish:
          id: b1_jam_error
          state: OFF

  - platform: template
    name: "Reset Blind 1 Position To 0"
    on_press:
      - lambda: |-
          id(b1_current_pos) = 0;
      - sensor.rotary_encoder.set_value:
          id: b1_encoder_position
          value: 0
      - component.update: b1_current_value_sensor

# ------------------------------------------------------------
# Cover component
# ------------------------------------------------------------

cover:
  - platform: template
    name: "Blind 1"
    id: blind_1
    device_class: blind
    has_position: true

    lambda: |-
      int top = id(b1_top_pulses);
      int bottom = id(b1_bottom_pulses);
      int current = id(b1_current_pos);

      if (bottom == top) {
        return {};
      }

      // Home Assistant conventie:
      // 0.0 = gesloten
      // 1.0 = open
      //
      // Aangenomen:
      // top < bottom
      float position = 1.0f - ((float)(current - top) / (float)(bottom - top));

      if (position < 0.0f) position = 0.0f;
      if (position > 1.0f) position = 1.0f;

      return position;

    open_action:
      - script.execute: motor_1_fully_open

    close_action:
      - script.execute: motor_1_fully_close

    stop_action:
      - script.execute: motor_1_stop_soft

    position_action:
      - lambda: |-
          int top = id(b1_top_pulses);
          int bottom = id(b1_bottom_pulses);

          if (bottom == top) {
            id(b1_auto_move) = false;
            return;
          }

          // pos uit Home Assistant:
          // pos = 0.0 -> gesloten -> bottom
          // pos = 1.0 -> open -> top
          id(b1_target_pos) = bottom - (int)((bottom - top) * pos);
          id(b1_auto_move) = true;

      - component.update: b1_target_value_sensor

      - if:
          condition:
            lambda: |-
              return id(b1_target_pos) < id(b1_current_pos) - id(b1_tolerance);
          then:
            - script.execute: motor_1_up_raw

      - if:
          condition:
            lambda: |-
              return id(b1_target_pos) > id(b1_current_pos) + id(b1_tolerance);
          then:
            - script.execute: motor_1_down_raw

      - if:
          condition:
            lambda: |-
              return abs(id(b1_target_pos) - id(b1_current_pos)) <= id(b1_tolerance);
          then:
            - script.execute: motor_1_stop_immediate

# ------------------------------------------------------------
# Grensbewaking en target-stop
# ------------------------------------------------------------

interval:
  - interval: 100ms
    then:
      # Softwarelimiet bovenaan
      # Alleen actief bij override level 0.
      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 1
                && id(b1_motor_direction) == 1
                && id(b1_current_pos) <= id(b1_top_pulses) + id(b1_tolerance);
          then:
            - script.execute: motor_1_stop_immediate

      # Softwarelimiet onderaan
      # Alleen actief bij override level 0.
      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 1
                && id(b1_motor_direction) == -1
                && id(b1_current_pos) >= id(b1_bottom_pulses) - id(b1_tolerance);
          then:
            - script.execute: motor_1_stop_immediate

      # Automatisch naar target: stop bij doel.
      # Deze blijft actief bij override, zodat cover-slider en fully open/close blijven stoppen.
      - if:
          condition:
            lambda: |-
              return id(b1_auto_move)
                && id(b1_motor_direction) == 1
                && id(b1_current_pos) <= id(b1_target_pos) + id(b1_tolerance);
          then:
            - script.execute: motor_1_stop_immediate

      - if:
          condition:
            lambda: |-
              return id(b1_auto_move)
                && id(b1_motor_direction) == -1
                && id(b1_current_pos) >= id(b1_target_pos) - id(b1_tolerance);
          then:
            - script.execute: motor_1_stop_immediate

# ------------------------------------------------------------
# Scripts
# ------------------------------------------------------------

script:
  # -------------------------
  # Manuele bediening
  # -------------------------

  - id: motor_1_up_manual
    mode: restart
    then:
      - lambda: |-
          id(b1_auto_move) = false;

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4 && id(b1_jam_error).state;
          then:
            - script.execute: motor_1_stop_immediate
          else:
            - if:
                condition:
                  lambda: |-
                    return id(b1_override_level) < 1
                      && id(b1_current_pos) <= id(b1_top_pulses) + id(b1_tolerance);
                then:
                  - script.execute: motor_1_stop_immediate
                else:
                  - script.execute: motor_1_up_raw

  - id: motor_1_down_manual
    mode: restart
    then:
      - lambda: |-
          id(b1_auto_move) = false;

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4 && id(b1_jam_error).state;
          then:
            - script.execute: motor_1_stop_immediate
          else:
            - if:
                condition:
                  lambda: |-
                    return id(b1_override_level) < 1
                      && id(b1_current_pos) >= id(b1_bottom_pulses) - id(b1_tolerance);
                then:
                  - script.execute: motor_1_stop_immediate
                else:
                  - script.execute: motor_1_down_raw

  # -------------------------
  # Volledig openen/sluiten
  # -------------------------

  - id: motor_1_fully_open
    mode: restart
    then:
      - lambda: |-
          id(b1_target_pos) = id(b1_top_pulses);
          id(b1_auto_move) = true;

      - component.update: b1_target_value_sensor

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4 && id(b1_jam_error).state;
          then:
            - script.execute: motor_1_stop_immediate
          else:
            - if:
                condition:
                  lambda: |-
                    return id(b1_current_pos) <= id(b1_top_pulses) + id(b1_tolerance);
                then:
                  - script.execute: motor_1_stop_immediate
                else:
                  - script.execute: motor_1_up_raw

  - id: motor_1_fully_close
    mode: restart
    then:
      - lambda: |-
          id(b1_target_pos) = id(b1_bottom_pulses);
          id(b1_auto_move) = true;

      - component.update: b1_target_value_sensor

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4 && id(b1_jam_error).state;
          then:
            - script.execute: motor_1_stop_immediate
          else:
            - if:
                condition:
                  lambda: |-
                    return id(b1_current_pos) >= id(b1_bottom_pulses) - id(b1_tolerance);
                then:
                  - script.execute: motor_1_stop_immediate
                else:
                  - script.execute: motor_1_down_raw

  # -------------------------
  # Ruwe motorstart
  # -------------------------

  - id: motor_1_up_raw
    mode: restart
    then:
      - script.stop: ramp_down_m1
      - script.stop: jam_check_b1

      - lambda: |-
          id(b1_motor_direction) = 1;
          id(b1_jam_start_pos) = id(b1_current_pos);

      - switch.turn_on: m1_in1
      - switch.turn_off: m1_in2

      - cover.template.publish:
          id: blind_1
          current_operation: OPENING

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) >= 2;
          then:
            - lambda: |-
                id(b1_pwm_level) = 1.0;
            - output.set_level:
                id: m1_speed_pin
                level: 1.0
          else:
            - script.execute: ramp_up_m1

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4;
          then:
            - script.execute: jam_check_b1

  - id: motor_1_down_raw
    mode: restart
    then:
      - script.stop: ramp_down_m1
      - script.stop: jam_check_b1

      - lambda: |-
          id(b1_motor_direction) = -1;
          id(b1_jam_start_pos) = id(b1_current_pos);

      - switch.turn_off: m1_in1
      - switch.turn_on: m1_in2

      - cover.template.publish:
          id: blind_1
          current_operation: CLOSING

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) >= 2;
          then:
            - lambda: |-
                id(b1_pwm_level) = 1.0;
            - output.set_level:
                id: m1_speed_pin
                level: 1.0
          else:
            - script.execute: ramp_up_m1

      - if:
          condition:
            lambda: |-
              return id(b1_override_level) < 4;
          then:
            - script.execute: jam_check_b1

  # -------------------------
  # Soft-start
  # -------------------------

  - id: ramp_up_m1
    mode: restart
    then:
      - lambda: |-
          id(b1_pwm_level) = 0.0;
      - repeat:
          count: 40
          then:
            - lambda: |-
                id(b1_pwm_level) += 0.025f;
                if (id(b1_pwm_level) > 1.0f) id(b1_pwm_level) = 1.0f;
            - output.set_level:
                id: m1_speed_pin
                level: !lambda "return id(b1_pwm_level);"
            - delay: 75ms

      - lambda: |-
          id(b1_pwm_level) = 1.0;
      - output.set_level:
          id: m1_speed_pin
          level: 1.0

  # -------------------------
  # Soft-stop
  # -------------------------

  - id: motor_1_stop_soft
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(b1_override_level) >= 2;
          then:
            - script.execute: motor_1_stop_immediate
          else:
            - if:
                condition:
                  lambda: |-
                    return id(b1_motor_direction) != 0;
                then:
                  - script.stop: ramp_up_m1
                  - script.stop: jam_check_b1
                  - script.execute: ramp_down_m1
                else:
                  - script.execute: motor_1_stop_immediate

  - id: ramp_down_m1
    mode: restart
    then:
      - repeat:
          count: 15
          then:
            - lambda: |-
                id(b1_pwm_level) -= 0.067f;
                if (id(b1_pwm_level) < 0.0f) id(b1_pwm_level) = 0.0f;
            - output.set_level:
                id: m1_speed_pin
                level: !lambda "return id(b1_pwm_level);"
            - delay: 40ms

      - script.execute: motor_1_stop_immediate

  # -------------------------
  # Onmiddellijke stop
  # Gebruikt bij limieten, target bereikt en jam
  # -------------------------

  - id: motor_1_stop_immediate
    mode: restart
    then:
      - script.stop: ramp_up_m1
      - script.stop: ramp_down_m1
      - script.stop: jam_check_b1

      - output.set_level:
          id: m1_speed_pin
          level: 0.0

      - switch.turn_off: m1_in1
      - switch.turn_off: m1_in2

      - lambda: |-
          id(b1_pwm_level) = 0.0;
          id(b1_motor_direction) = 0;
          id(b1_auto_move) = false;
          id(b1_current_pos) = (int) id(b1_encoder_position).state;

      - component.update: b1_current_value_sensor

      - cover.template.publish:
          id: blind_1
          current_operation: IDLE

  # -------------------------
  # Jamdetectie
  # -------------------------

  - id: jam_check_b1
    mode: restart
    then:
      # Eerst wachten tot de soft-start voorbij het traagste deel is.
      - delay: 4s

      - if:
          condition:
            lambda: |-
              if (id(b1_override_level) >= 4) return false;
              if (id(b1_motor_direction) == 0) return false;

              int delta = abs(id(b1_current_pos) - id(b1_jam_start_pos));
              return delta < id(b1_jam_min_delta);
          then:
            - binary_sensor.template.publish:
                id: b1_jam_error
                state: ON
            - script.execute: motor_1_stop_immediate